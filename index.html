              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function GeneralCalendarView({ employees, toast, setSelectedEmp, sendNotification }) {
  const [unavailData, setUnavailData] = useState([]);
  const [events, setEvents] = useState([]);
  const [assignments, setAssignments] = useState([]);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [showEventModal, setShowEventModal] = useState(false);
  
  const [selectedDay, setSelectedDay] = useState(null);
  const [showDayModal, setShowDayModal] = useState(false);

  const [loading, setLoading] = useState(false);
  
  const today = new Date();
  const [viewDate, setViewDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));

  const load = useCallback(async () => {
    setLoading(true);
    const start = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).toISOString().split('T')[0];
    const end = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).toISOString().split('T')[0];
    
    try {
      const { data: unavail } = await supabaseClient.from('unavailable_days').select('user_id, fecha').gte('fecha', start).lte('fecha', end);
      setUnavailData(unavail || []);

      const { data: evs } = await supabaseClient.from('events').select('*').gte('fecha', start).lte('fecha', end);
      setEvents(evs || []);

      if (evs && evs.length > 0) {
        const evIds = evs.map(e => e.id);
        const { data: asgs } = await supabaseClient.from('event_assignments').select('*').in('event_id', evIds);
        setAssignments(asgs || []);
      } else {
        setAssignments([]);
      }
    } catch (err) {
      console.error(err);
      toast('Error al cargar datos del calendario', 'danger');
    } finally {
      setLoading(false);
    }
  }, [viewDate, toast]);

  useEffect(() => { load(); }, [load]);

  const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
  const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
  const offset = (firstDay + 6) % 7;

  // Document types to check for expiration
  const docFields = [
    { key: 'prl_art19_fecha', label: 'PRL 19' },
    { key: 'prl_60h_fecha', label: 'PRL 60h' },
    { key: 'carretilla_fecha', label: 'Carretilla' },
    { key: 'reconocimiento_fecha', label: 'R. Medico' }
  ];

  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', marginBottom: 20, alignItems:'center'}}>
        <h1>Calendario General</h1>
        <div style={{display:'flex', gap: 15, alignItems:'center'}}>
          <button className="btn btn-primary" onClick={() => { setSelectedEvent(null); setShowEventModal(true); }}>
            <i className="fa-solid fa-calendar-plus"></i> Nuevo Evento
          </button>
          <div style={{display:'flex', gap: 10, alignItems:'center'}}>
            <h3 style={{fontSize: 18}}>{viewDate.toLocaleString('es', { month: 'long', year: 'numeric' }).toUpperCase()}</h3>
            <div style={{display:'flex', gap: 5}}>
              <button className="btn btn-secondary" onClick={()=>setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1))}><i className="fa-solid fa-chevron-left"></i></button>
              <button className="btn btn-secondary" onClick={()=>setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1))}><i className="fa-solid fa-chevron-right"></i></button>
            </div>
          </div>
        </div>
      </div>
      
      <div className="gen-cal-grid">
        {['LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO','DOMINGO'].map(d => <div key={d} className="cal-day-name">{d}</div>)}
        {Array(offset).fill(0).map((_,i) => <div key={i} className="gen-cal-day" style={{opacity: 0.2, background:'transparent', boxShadow:'none'}}></div>)}
        {Array(daysInMonth).fill(0).map((_,i) => {
          const d = i + 1;
          const dateStr = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const isToday = dateStr === new Date().toISOString().split('T')[0];
          
          const dayEvents = events.filter(ev => ev.fecha === dateStr);
          const dayExpirations = [];
          employees.forEach(e => {
            docFields.forEach(f => {
              if (e[f.key] === dateStr) dayExpirations.push({ emp: e.nombre, doc: f.label });
            });
          });

          return (
            <div 
              key={d} 
              className={`gen-cal-day ${isToday?'today':''}`}
              onClick={() => { setSelectedDay(dateStr); setShowDayModal(true); }}
              style={{ cursor: 'pointer' }}
            >
              <div className="gen-cal-day-num">{d}</div>
              
              <div style={{overflowY:'auto', flex: 1, display:'flex', flexDirection:'column', gap: 2}}>
                {dayExpirations.map((exp, idx) => (
                  <div key={idx} style={{background: 'var(--danger-bg)', color: 'var(--danger)', fontSize: 8, padding: '1px 4px', borderRadius: 4, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
                    ⚠️ {exp.doc}: {exp.emp}
                  </div>
                ))}

                {dayEvents.map(ev => {
                  const evAsgs = assignments.filter(a => a.event_id === ev.id);
                  return (
                    <button 
                      key={ev.id} 
                      className="event-tag" 
                      onClick={(e)=>{ e.stopPropagation(); setSelectedEvent(ev); setShowEventModal(true); }}
                    >
                      <i className="fa-solid fa-star" style={{fontSize: 8}}></i> {ev.nombre} ({evAsgs.length})
                    </button>
                  );
                })}
                
                <div style={{marginTop: 4, paddingTop: 4, borderTop: (dayEvents.length || dayExpirations.length) ? '1px solid var(--border)' : 'none', display:'flex', flexWrap:'wrap', gap: 2}}>
                  {employees.map(e => {
                    const isUnavail = unavailData.some(u => u.user_id === e.id && u.fecha === dateStr);
                    const catChars = [];
                    if (e.es_carga) catChars.push('C');
                    if (e.es_protocolo) catChars.push('P');
                    if (e.es_rigger) catChars.push('R');
                    const catStr = catChars.length ? `[${catChars.join('')}]` : '';

                    return (
                      <div key={e.id} className={`emp-tag ${isUnavail?'unavail':'avail'}`} style={{fontSize: 8, padding: '1px 3px', whiteSpace:'nowrap'}}>
                        {e.nombre} {catStr}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {showDayModal && (
        <DayDetailsModal 
          date={selectedDay}
          employees={employees}
          unavailData={unavailData}
          events={events}
          assignments={assignments}
          onAddEvent={(date) => { setSelectedEvent({ fecha: date }); setShowEventModal(true); }}
          onEditEvent={(ev) => { setSelectedEvent(ev); setShowEventModal(true); }}
          onEditEmp={(emp) => { setSelectedEmp(emp); setShowDayModal(false); }}
          onClose={() => setShowDayModal(false)}
        />
      )}

      {showEventModal && (
        <EventModal 
          event={selectedEvent} 
          employees={employees} 
          onSave={() => { setShowEventModal(false); load(); }} 
          onCancel={() => setShowEventModal(false)} 
          toast={toast}
          sendNotification={sendNotification}
        />
      )}
    </div>
  );
}

function GlobalEpisInventory({ isAdmin }) {
  const [templates, setTemplates] = useState([]);
  const [assignments, setAssignments] = useState([]);
  const [loading, setLoading] = useState(true);
  const [searchTerm, setSearchTerm] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [editingEpi, setEditingEpi] = useState(null);
  const [viewingDistribution, setViewingDistribution] = useState(null); // epi_nombre

  const fetchData = async () => {
    setLoading(true);
    try {
      // 1. Obtener plantillas globales
      const { data: tData } = await supabaseClient.from('global_epi_templates').select('*').order('epi_nombre');
      
      // Eliminar duplicados visuales en las plantillas por nombre (quedándonos con la más reciente o la primera)
      const uniqueTemplates = [];
      const seenNames = new Set();
      if (tData) {
        tData.forEach(item => {
          const name = item.epi_nombre.trim().toLowerCase();
          if (!seenNames.has(name)) {
            seenNames.add(name);
            uniqueTemplates.push(item);
          }
        });
      }
      setTemplates(uniqueTemplates);

      // 2. Obtener TODAS las asignaciones
      const { data: aData } = await supabaseClient
        .from('employee_epis')
        .select(`
          *,
          profiles:profile_id (nombre, apellidos)
        `);
      setAssignments(aData || []);
    } catch (err) {
      console.error('Error al cargar inventario:', err);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => {
    fetchData();
  }, []);

  const filtered = templates.filter(t => 
    t.epi_nombre.toLowerCase().includes(searchTerm.toLowerCase()) ||
    (t.modelo && t.modelo.toLowerCase().includes(searchTerm.toLowerCase())) ||
    (t.proveedor && t.proveedor.toLowerCase().includes(searchTerm.toLowerCase()))
  );

  const handleSave = async (epiData) => {
    try {
      const { id, created_at, ...cleanData } = epiData;
      // Normalizar nombre para evitar duplicados
      if (cleanData.epi_nombre) cleanData.epi_nombre = cleanData.epi_nombre.trim();
      
      if (id && !id.toString().startsWith('temp_')) {
        await supabaseClient.from('global_epi_templates').update(cleanData).eq('id', id);
        if (cleanData.foto_url) {
          await supabaseClient.from('employee_epis').update({ foto_url: cleanData.foto_url }).eq('epi_nombre', cleanData.epi_nombre);
        }
      } else {
        await supabaseClient.from('global_epi_templates').insert([cleanData]);
      }
      fetchData();
      setShowModal(false);
      setEditingEpi(null);
    } catch (err) {
      console.error('Error al guardar EPI global:', err);
    }
  };

  const handleDelete = async (id) => {
    if (!confirm('¿Seguro que quieres eliminar este EPI de la lista global?')) return;
    await supabaseClient.from('global_epi_templates').delete().eq('id', id);
    fetchData();
  };

  return (
    <div>
      <div className="page-header" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <h1>Inventario de EPIs</h1>
        {isAdmin && (
          <button className="btn btn-primary" onClick={() => { setEditingEpi(null); setShowModal(true); }}>
            <i className="fa-solid fa-plus"></i> Nuevo Equipo Global
          </button>
        )}
      </div>

      <div className="card" style={{marginBottom: 20}}>
        <div style={{position: 'relative'}}>
          <i className="fa-solid fa-magnifying-glass" style={{position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--text3)', fontSize: 13}}></i>
          <input 
            type="text" 
            placeholder="Buscar por nombre, modelo o proveedor..." 
            value={searchTerm} 
            onChange={e => setSearchTerm(e.target.value)}
            style={{paddingLeft: 35}}
          />
        </div>
      </div>

      {loading ? (
        <div style={{textAlign: 'center', padding: '50px 0'}}>
          <i className="fa-solid fa-circle-notch fa-spin" style={{fontSize: 30, color: 'var(--accent)', marginBottom: 15}}></i>
          <div>Cargando inventario completo...</div>
        </div>
      ) : (
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: 20}}>
          {filtered.length === 0 ? (
            <div className="card" style={{gridColumn: '1/-1', textAlign: 'center', padding: 40, color: 'var(--text3)'}}>
              <i className="fa-solid fa-helmet-safety" style={{fontSize: 40, marginBottom: 15, opacity: 0.2}}></i>
              <p>No se han encontrado equipos.</p>
            </div>
          ) : filtered.map(epi => {
            const epiAssignments = assignments.filter(a => a.epi_nombre === epi.epi_nombre);
            const count = epiAssignments.length;

            return (
              <div key={epi.id} className="card" style={{padding: 0, overflow: 'hidden', display: 'flex', flexDirection: 'column'}}>
                <div style={{width: '100%', aspectRatio: '16/9', background: 'var(--bg3)', position: 'relative'}}>
                  {epi.foto_url ? (
                    <img src={epi.foto_url} style={{width: '100%', height: '100%', objectFit: 'cover'}} alt={epi.epi_nombre} />
                  ) : (
                    <div style={{width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                      <i className="fa-solid fa-camera" style={{fontSize: 30, color: 'var(--text3)', opacity: 0.3}}></i>
                    </div>
                  )}
                  <div style={{position: 'absolute', top: 10, right: 10, background: count > 0 ? 'var(--accent)' : 'var(--text3)', color: 'white', padding: '4px 10px', borderRadius: 20, fontSize: 12, fontWeight: 700, boxShadow: '0 2px 8px rgba(0,0,0,0.2)'}}>
                    {count} {count === 1 ? 'asignado' : 'asignados'}
                  </div>
                </div>
                
                <div style={{padding: 15, flex: 1}}>
                  <div style={{fontWeight: 700, fontSize: 16, marginBottom: 5}}>{epi.epi_nombre}</div>
                  <div style={{fontSize: 13, color: 'var(--text2)', marginBottom: 10}}>
                    {epi.modelo || 'Sin modelo'} {epi.proveedor ? `· ${epi.proveedor}` : ''}
                  </div>
                  
                  {count > 0 && (
                    <button 
                      className="btn btn-secondary btn-full" 
                      style={{fontSize: 11, padding: '8px', marginBottom: 10, background: 'rgba(255, 51, 153, 0.05)', borderColor: 'rgba(255, 51, 153, 0.2)', color: 'var(--accent2)'}}
                      onClick={() => setViewingDistribution(epi.epi_nombre)}
                    >
                      <i className="fa-solid fa-users"></i> Ver quién lo tiene
                    </button>
                  )}
                </div>

                <div style={{padding: 10, borderTop: '1px solid var(--border)', display: 'flex', gap: 8, background: 'var(--bg2)'}}>
                  <button className="btn btn-secondary btn-full" style={{fontSize: 12}} onClick={() => { setEditingEpi(epi); setShowModal(true); }}>
                    <i className="fa-solid fa-pen"></i> Editar Ficha
                  </button>
                  {isAdmin && (
                    <button className="btn btn-danger" style={{width: 40}} onClick={() => handleDelete(epi.id)}>
                      <i className="fa-solid fa-trash"></i>
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* MODAL DE DISTRIBUCIÓN */}
      {viewingDistribution && (
        <div className="modal-overlay" style={{zIndex: 500}}>
          <div className="modal" style={{maxWidth: 700}}>
            <div className="modal-header">
              <div>
                <h2>Distribución: {viewingDistribution}</h2>
                <p style={{fontSize: 12, color: 'var(--text3)'}}>Listado de empleados que tienen este equipo actualmente.</p>
              </div>
              <button className="btn btn-secondary" onClick={() => setViewingDistribution(null)}><i className="fa-solid fa-xmark"></i></button>
            </div>
            <div className="modal-body" style={{padding: 0}}>
              <table style={{width: '100%', borderCollapse: 'collapse'}}>
                <thead style={{background: 'var(--bg3)'}}>
                  <tr>
                    <th style={{padding: 12, textAlign: 'left', fontSize: 11}}>EMPLEADO</th>
                    <th style={{padding: 12, textAlign: 'left', fontSize: 11}}>FECHA FABRICACIÓN</th>
                    <th style={{padding: 12, textAlign: 'left', fontSize: 11}}>FECHA CADUCIDAD</th>
                  </tr>
                </thead>
                <tbody>
                  {assignments
                    .filter(a => a.epi_nombre === viewingDistribution)
                    .map((a, idx) => (
                      <tr key={idx} style={{borderBottom: '1px solid var(--border)'}}>
                        <td style={{padding: 12}}>
                          <div style={{fontWeight: 600, fontSize: 13}}>{a.profiles?.nombre} {a.profiles?.apellidos}</div>
                        </td>
                        <td style={{padding: 12, fontSize: 12, color: 'var(--text2)'}}>
                          {a.fecha_fabricacion ? new Date(a.fecha_fabricacion).toLocaleDateString() : '—'}
                        </td>
                        <td style={{padding: 12, fontSize: 12}}>
                          {a.fecha_caducidad ? (
                            <span style={{color: new Date(a.fecha_caducidad) < new Date() ? 'var(--danger)' : 'var(--text2)'}}>
                              {new Date(a.fecha_caducidad).toLocaleDateString()}
                            </span>
                          ) : '—'}
                        </td>
                      </tr>
                    ))}
                </tbody>
              </table>
              <div style={{padding: 20, textAlign: 'right'}}>
                <button className="btn btn-secondary" onClick={() => setViewingDistribution(null)}>Cerrar</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {showModal && (
        <EpiModal 
          epi={editingEpi} 
          onSave={handleSave} 
          onCancel={() => { setShowModal(false); setEditingEpi(null); }} 
        />
      )}
    </div>
  );
}

function MainApp() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(false);
  
  const [page, setPage] = useState('dashboard');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [employees, setEmployees] = useState([]);
  const [events, setEvents] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [showNotifications, setShowNotifications] = useState(false);
  const [selectedEmp, setSelectedEmp] = useState(null);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [showEventModal, setShowEventModal] = useState(false);
  const [showAddModal, setShowAddModal] = useState(false);
  const [toasts, setToasts] = useState([]);

  // Sistema de múltiples ventanas minimizadas
  const [minimizedEmps, setMinimizedEmps] = useState([]);

  // Estados para modal de empleado activo (el que está abierto ahora)
  const [empModalPos, setEmpModalPos] = useState({ x: 0, y: 0 });
  const [isDragging, setIsDragging] = useState(false);
  const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });

  const handleMinimize = (emp) => {
    setMinimizedEmps(p => {
      // Evitar duplicados
      if (p.find(e => e.id === emp.id)) return p;
      return [...p, emp];
    });
    setSelectedEmp(null);
  };

  const restoreEmp = (emp) => {
    // Si ya hay uno abierto, minimizamos el actual primero
    if (selectedEmp) {
      setMinimizedEmps(p => {
        const filtered = p.filter(e => e.id !== emp.id);
        return [...filtered, selectedEmp];
      });
    } else {
      setMinimizedEmps(p => p.filter(e => e.id !== emp.id));
    }
    setSelectedEmp(emp);
    setEmpModalPos({ x: 0, y: 0 });
  };

  const handleMouseDown = (e) => {
    if (e.target.closest('.modal-header')) {
      setIsDragging(true);
      setDragOffset({
        x: e.clientX - empModalPos.x,
        y: e.clientY - empModalPos.y
      });
    }
  };

  const handleMouseMove = (e) => {
    if (isDragging) {
      setEmpModalPos({
        x: e.clientX - dragOffset.x,
        y: e.clientY - dragOffset.y
      });
    }
  };

  const handleMouseUp = () => {
    setIsDragging(false);
  };

  useEffect(() => {
    if (isDragging) {
      window.addEventListener('mousemove', handleMouseMove);
      window.addEventListener('mouseup', handleMouseUp);
    } else {
      window.removeEventListener('mousemove', handleMouseMove);
      window.removeEventListener('mouseup', handleMouseUp);
    }
    return () => {
      window.removeEventListener('mousemove', handleMouseMove);
      window.removeEventListener('mouseup', handleMouseUp);
    };
  }, [isDragging, dragOffset]);

  const sendNotification = async (profileId, title, message, type, isForAdmin = false) => {
    try {
      await supabaseClient.from('notifications').insert({
        profile_id: profileId,
        title,
        message,
        type,
        is_for_admin: isForAdmin
      });
    } catch (err) {
      console.error('Error sending notification:', err);
    }
  };

  const loadNotifications = async (profileToUse = profile) => {
    if (!profileToUse) {
      console.log('loadNotifications abortado: no hay perfil');
      return;
    }
    try {
      console.log('Iniciando carga de notificaciones para:', profileToUse.nombre, profileToUse.id);
      let query = supabaseClient.from('notifications').select('*').order('created_at', { ascending: false }).limit(20);
      
      if (profileToUse.role === 'admin') {
        query = query.or(`profile_id.eq.${profileToUse.id},is_for_admin.eq.true`);
      } else {
        query = query.eq('profile_id', profileToUse.id);
      }

      const { data, error } = await query;
      if (error) {
        console.error('Error de Supabase en loadNotifications:', error);
        if (error.code === 'PGRST116' || error.message?.includes('not found')) {
          console.warn('AVISO: La tabla "notifications" no existe. Ejecuta el script SQL.');
        }
        return;
      }
      console.log('Notificaciones recuperadas con éxito:', data?.length);
      setNotifications(data || []);
    } catch (err) {
      console.error('Excepción en loadNotifications:', err);
    }
  };

  const markAsRead = async (id) => {
    await supabaseClient.from('notifications').update({ is_read: true }).eq('id', id);
    loadNotifications();
  };

  const toast = (msg, type='info') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000);
  };

  const loadProfile = async (uid, manualProfile = null) => {
    if (!uid && !manualProfile) return;
    
    let currentProfile = manualProfile;
    if (!currentProfile) {
      const { data } = await supabaseClient.from('profiles').select('*').eq('id', uid).single();
      currentProfile = data;
    }

    if (currentProfile) {
      setProfile(currentProfile);
      if (currentProfile.role === 'admin') {
        loadEmployees();
      }
      // Aseguramos que cargamos todo usando el perfil actual directamente
      loadEvents(currentProfile);
      loadNotifications(currentProfile);
    }
  };

  const loadEmployees = async () => {
    const { data: profs, error } = await supabaseClient.from('profiles').select('*').order('nombre');
    if (error) {
      console.error('Error cargando empleados:', error);
      toast('Error al cargar la lista de empleados', 'danger');
    } else {
      const { data: titles } = await supabaseClient.from('employee_titles').select('*');
      const { data: epis } = await supabaseClient.from('employee_epis').select('*');
      console.log('EPIs totales cargados de DB:', epis?.length);
      const empsWithAll = (profs || []).map(p => ({
        ...p,
        custom_titles: (titles || []).filter(t => t.profile_id === p.id),
        epis: (epis || []).filter(e => e.profile_id === p.id)
      }));
      console.log('Empleados procesados con sus EPIs:', empsWithAll.length);
      setEmployees(empsWithAll);
    }
  };

  const loadEvents = async (profileToUse = profile) => {
    if (!profileToUse) {
      console.log('loadEvents abortado: no hay perfil');
      return;
    }
    
    const now = new Date();
    now.setHours(0,0,0,0);
    const todayStr = now.toISOString().split('T')[0];
    console.log('Cargando eventos desde:', todayStr, 'para:', profileToUse.nombre);
    
    try {
      if (profileToUse.role === 'admin') {
        const { data, error } = await supabaseClient
          .from('events')
          .select('*')
          .gte('fecha', todayStr)
          .order('fecha', { ascending: true })
          .limit(10);
        
        if (error) {
          console.error('Error Admin loadEvents:', error);
        } else {
          console.log('Eventos Admin cargados:', data?.length);
          setEvents(data || []);
        }
      } else {
        // Para empleados: buscar solo sus eventos asignados
        console.log('Buscando asignaciones para ID:', profileToUse.id);
        const { data, error } = await supabaseClient
          .from('event_assignments')
          .select('horario, categoria_asignada, events (*)')
          .eq('profile_id', profileToUse.id);
        
        if (error) {
          console.error('Error Empleado loadEvents:', error);
        } else if (data) {
          console.log('Asignaciones brutas:', data.length);
          const formatted = data
            .filter(asg => asg.events && asg.events.fecha >= todayStr)
            .map(asg => ({
              ...asg.events,
              horario_asignado: asg.horario,
              categoria_asignada: asg.categoria_asignada
            }))
            .sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
          
          console.log('Eventos filtrados y formateados:', formatted.length);
          setEvents(formatted);
        }
      }
    } catch (err) {
      console.error('Excepción en loadEvents:', err);
    }
  };

  const syncProfiles = async () => {
    setLoading(true);
    toast('Sincronizando datos...', 'info');
    await loadEmployees();
    await loadEvents();
    setLoading(false);
    toast('Dashboard actualizado', 'success');
  };

  useEffect(() => {
    const sb = initSupabase();
    if (!sb) return;
    
    sb.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user || null);
      if (session?.user) loadProfile(session.user.id);
    });

    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user || null);
      if (session?.user) loadProfile(session.user.id);
      else setProfile(null);
    });
    
    // Polling de notificaciones cada 60 segundos
    const interval = setInterval(() => {
      loadNotifications();
    }, 60000);

    return () => {
      subscription.unsubscribe();
      clearInterval(interval);
    };
  }, []);

  // Función para crear empleado (Directo a Tabla, sin Auth)

    const tempId = crypto.randomUUID();

      username: empData.username.toLowerCase(),
      password_manual: empData.password,
      nombre: empData.nombre,
      apellidos: empData.apellidos,
      role: empData.role || 'employee',
      es_carga: !!empData.es_carga,
      es_protocolo: !!empData.es_protocolo,
      es_rigger: !!empData.es_rigger
    });

    if (!profError) {
      // Ya no cargamos EPIs automáticos, el admin los asignará manualmente desde la ficha
      console.log('Perfil creado sin EPIs automáticos');
    }

    setLoading(false);
    if (profError) {
      console.error('Error al crear perfil:', profError);
      toast('Error al guardar el empleado. Asegúrate de que el usuario no esté repetido.', 'danger');
    } else {
      toast('Empleado añadido con éxito', 'success');
      loadEmployees();
      setShowAddModal(false);
    }

    <AuthPage 
      toast={toast}

        setUser(u); 
        loadProfile(u.id, p);
        setPage('dashboard');

      if (e.custom_titles) {

              <div style={{display:'flex', gap: 5}}>
                {notifications.some(n => !n.is_read) && (
                  <button className="btn btn-secondary" style={{padding:'4px 8px', fontSize: 10}} onClick={async ()=>{
                    await supabaseClient.from('notifications').update({ is_read: true }).eq('profile_id', profile.id);
                    if(profile.role === 'admin') await supabaseClient.from('notifications').update({ is_read: true }).eq('is_for_admin', true);
                    loadNotifications();
                  }}>Leer todo</button>
                )}
                <button className="btn btn-secondary" style={{padding:'4px 8px'}} onClick={()=>setShowNotifications(false)}><i className="fa-solid fa-xmark"></i></button>
              </div>
            </div>
            <div style={{maxHeight:'400px', overflowY:'auto', display:'flex', flexDirection:'column', gap:8}}>
              {notifications.length === 0 ? <div style={{textAlign:'center', padding:20, color:'var(--text3)', fontSize:12}}>No hay notificaciones</div> : notifications.map(n => (
                <div key={n.id} style={{padding:10, background: n.is_read ? 'var(--bg3)' : 'var(--accent-bg)', borderRadius:8, border:'1px solid var(--border)', fontSize:12, position:'relative'}}>
                  <div style={{fontWeight:600, marginBottom:2}}>{n.title}</div>
                  <div style={{color:'var(--text2)', marginBottom:5}}>{n.message}</div>
                  <div style={{fontSize:10, color:'var(--text3)'}}>{new Date(n.created_at).toLocaleString()}</div>
                  {!n.is_read && <button onClick={()=>markAsRead(n.id)} style={{position:'absolute', top:10, right:10, background:'transparent', border:'none', color:'var(--accent)', cursor:'pointer'}} title="Marcar como leída"><i className="fa-solid fa-check"></i></button>}
                </div>

                <div className="stat-label">AVISOS NUEVOS</div>

              </div>
            </div>
          </div>

              <h1>Gestión de Administradores</h1>
              <button className="btn btn-primary" onClick={()=>setShowAddModal(true)}>
                <i className="fa-solid fa-user-shield"></i> Nuevo Administrador
              </button>
            </div>
            <div className="card" style={{padding: 0, overflow:'hidden'}}>
              <table style={{width:'100%', borderCollapse:'collapse'}}>
                <thead style={{background:'var(--bg3)'}}>
                  <tr>
                    <th style={{padding: 15, textAlign:'left', fontSize: 12}}>NOMBRE</th>
                    <th style={{padding: 15, textAlign:'left', fontSize: 12}}>USUARIO</th>
                    <th style={{padding: 15, textAlign:'left', fontSize: 12}}>ACCIONES</th>
                  </tr>
                </thead>
                <tbody>
                  {employees.filter(e => e.role === 'admin').map(e => (
                    <tr key={e.id} style={{borderBottom: '1px solid var(--border)'}}>
                      <td style={{padding: 15}}>{e.nombre} {e.apellidos || ''}</td>
                      <td style={{padding: 15}}>{e.username}</td>
                      <td style={{padding: 15}}>
                        <div style={{display:'flex', gap: 5}}>
                          <button className="btn btn-secondary" onClick={()=>setSelectedEmp(e)}>Editar / Password</button>
                          {e.id !== profile.id && (
                            <button className="btn btn-danger" onClick={async ()=>{
                              if(confirm(`¿Eliminar a ${e.nombre}?`)){
                                await supabaseClient.from('profiles').delete().eq('id', e.id);
                                loadEmployees();
                                toast('Administrador eliminado', 'success');
                              }
                            }}><i className="fa-solid fa-trash"></i></button>
                          )}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {page === 'myprofile' && (
          <div>
            <div className="page-header"><h1>Mi Ficha Personal</h1></div>
            <div className="card">
              <EmployeeForm 
                profile={profile} 
                isAdmin={false} 
                onSave={(newProfile)=>{
                  loadProfile(profile.id);
                  toast('Datos guardados correctamente', 'success');
                  setPage('dashboard');
                }} 
                onCancel={()=>setPage('dashboard')} 
                sendNotification={sendNotification}
                currentUser={profile}
              />
            </div>
          </div>
        )}

        {page === 'mycal' && !isAdmin && (
          <div>
            <div className="page-header"><h1>Mi Disponibilidad</h1><p style={{fontSize: 14, color: 'var(--text2)'}}>Marca los días que NO estás disponible para trabajar.</p></div>
            <CalendarView userId={profile.id} isAdmin={false} toast={toast} />
          </div>
        )}

        {page === 'epis_global' && isAdmin && (
          <GlobalEpisInventory isAdmin={isAdmin} />
        )}
        </main>

      {selectedEmp && (
        <div className="modal-overlay">
          <div 
            className="modal" 
            style={{
              maxWidth: 1000, 
              transform: `translate(${empModalPos.x}px, ${empModalPos.y}px)`,
              transition: isDragging ? 'none' : 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
              position: 'relative'
            }}
          >
            <div 
              className="modal-header" 
              onMouseDown={handleMouseDown} 
              style={{ cursor: 'move', userSelect: 'none' }}
            >
              <div style={{ display: 'flex', alignItems: 'center', gap: 15 }}>
                <i className="fa-solid fa-user-gear" style={{ color: 'var(--accent)', fontSize: 20 }}></i>
                <div>
                  <h2 style={{ fontSize: 16 }}>Ficha: {selectedEmp.nombre} {selectedEmp.apellidos || ''}</h2>
                  <p style={{ fontSize: 11, color: 'var(--text3)' }}>{selectedEmp.role === 'admin' ? 'Personal de Administración' : 'Personal Operativo'}</p>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button 
                  className="btn btn-secondary" 
                  style={{ width: 32, height: 32, padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }} 
                  onClick={() => handleMinimize(selectedEmp)}
                  title="Minimizar"
                >
                  <i className="fa-solid fa-window-minimize"></i>
                </button>
                <button 
                  className="btn btn-secondary" 
                  style={{ width: 32, height: 32, padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }} 
                  onClick={() => setSelectedEmp(null)}
                  title="Cerrar"
                >
                  <i className="fa-solid fa-xmark"></i>
                </button>
              </div>
            </div>
            <div className="modal-body">
              <div className="tabs">
                <button className="tab active">Datos</button>
              </div>
              <EmployeeForm 
                profile={selectedEmp} 
                isAdmin={isAdmin} 
                onSave={() => { loadEmployees(); setSelectedEmp(null); }} 
                onCancel={() => setSelectedEmp(null)} 
                sendNotification={sendNotification}
                currentUser={profile}
              />
              {selectedEmp.role !== 'admin' && (
                <div style={{ marginTop: 20 }}>
                  <h4 style={{ marginBottom: 10, fontSize: 13 }}>DISPONIBILIDAD</h4>
                  <CalendarView userId={selectedEmp.id} isAdmin={true} toast={toast} />
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* BARRA DE TAREAS PARA VENTANAS MINIMIZADAS */}
      {minimizedEmps.length > 0 && (
        <div style={{ position: 'fixed', bottom: 20, right: 20, zIndex: 1000, display: 'flex', flexDirection: 'column', gap: 8, pointerEvents: 'none' }}>
          {minimizedEmps.map(emp => (
            <div 
              key={emp.id}
              className="card"
              onClick={() => restoreEmp(emp)}
              style={{ 
                width: 280, 
                padding: '10px 15px', 
                margin: 0, 
                background: 'var(--bg2)', 
                border: '2px solid var(--accent)', 
                cursor: 'pointer', 
                pointerEvents: 'auto',
                boxShadow: '0 10px 30px rgba(0,0,0,0.3)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                animation: 'slideIn 0.3s'
              }}
            >
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <i className="fa-solid fa-user-gear" style={{ color: 'var(--accent)', fontSize: 16 }}></i>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{emp.nombre} {emp.apellidos}</div>
              </div>
              <div style={{ display: 'flex', gap: 5 }}>
                <i className="fa-solid fa-window-maximize" style={{ color: 'var(--text3)', fontSize: 12 }}></i>
                <button 
                  onClick={(e) => { e.stopPropagation(); setMinimizedEmps(p => p.filter(ex => ex.id !== emp.id)); }} 
                  style={{ background: 'transparent', border: 'none', color: 'var(--text3)', cursor: 'pointer', padding: '0 5px' }}
                >
                  <i className="fa-solid fa-xmark"></i>
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {showAddModal && (
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth: 400}}>
            <div className="modal-header">
              <h2>Registrar Nuevo Empleado</h2>
              <button className="btn btn-secondary" onClick={()=>setShowAddModal(false)}><i className="fa-solid fa-xmark"></i></button>
            </div>
            <div className="modal-body">
              <AddEmployeeForm onSave={addEmployee} onCancel={()=>setShowAddModal(false)} isLoading={loading} />
            </div>
          </div>
        </div>
      )}

      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast alert alert-${t.type}`}>{t.msg}</div>
        ))}
      </div>
    </div>
  );
}

function AddEmployeeForm({ onSave, onCancel, isLoading }) {
  const [f, setF] = useState({ nombre: '', apellidos: '', user: '', pass: '', role: 'employee' });
  return (
    <div>
      <div className="form-group"><label>Nombre</label><input value={f.nombre} onChange={e=>setF({...f, nombre: e.target.value})} /></div>
      <div className="form-group"><label>Apellidos</label><input value={f.apellidos} onChange={e=>setF({...f, apellidos: e.target.value})} /></div>
      <div className="form-group"><label>Usuario (Login)</label><input value={f.user} onChange={e=>setF({...f, user: e.target.value})} /></div>
      <div className="form-group"><label>Contraseña</label><input type="password" value={f.pass} onChange={e=>setF({...f, pass: e.target.value})} /></div>
      <div className="form-group">
        <label>Rol / Función Principal</label>
        <select 
          value={f.role === 'admin' ? 'admin' : (f.es_carga ? 'carga' : (f.es_protocolo ? 'protocolo' : (f.es_rigger ? 'rigger' : 'employee')))} 
          onChange={e => {
            const val = e.target.value;
            if (val === 'admin') {
              setF({...f, role: 'admin', es_carga: false, es_protocolo: false, es_rigger: false});
            } else {
              setF({
                ...f, 
                role: 'employee', 
                es_carga: val === 'carga', 
                es_protocolo: val === 'protocolo', 
                es_rigger: val === 'rigger'
              });
            }
          }}
        >
          <option value="employee">— Seleccionar —</option>
          <option value="admin">Administrador</option>
          <option value="carga">Carga / Descarga</option>
          <option value="protocolo">Protocolo</option>
          <option value="rigger">Rigger</option>
        </select>
      </div>
      <div style={{display:'flex', gap: 10, marginTop: 20}}>
        <button 
          className="btn btn-primary btn-full" 
          onClick={()=>onSave({
            username: f.user, 
            password: f.pass, 
            nombre: f.nombre, 
            apellidos: f.apellidos, 
            role: f.role,
            es_carga: f.es_carga,
            es_protocolo: f.es_protocolo,
            es_rigger: f.es_rigger
          })} 
          disabled={isLoading || !f.nombre || !f.user || !f.pass}
        >
          {isLoading ? 'Creando...' : 'Crear Acceso'}
        </button>
        <button className="btn btn-secondary" onClick={onCancel} disabled={isLoading}>Cancelar</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<MainApp />);

// Registro del Service Worker para PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('Service Worker registrado con éxito:', reg.scope);
    }).catch(err => {
      console.log('Error al registrar el Service Worker:', err);
    });
  });
}
</script>
</body>
</html>
